services:
  # ─── Core API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "0.0.0.0:4090:8000"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://healthos:healthos@postgres:5432/healthos
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: healthos
      CORS_ORIGINS: "http://localhost:3000,http://localhost:3001,http://localhost:3052,http://108.48.39.238:3052,http://clinical-orchestrator:8001,http://iot-simulator:8004"
      KEYCLOAK_URL: http://keycloak:8080
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn healthos_platform.api.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - healthos

  # ─── Clinician Dashboard ──────────────────────────────────────────────────
  dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "0.0.0.0:3052:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://108.48.39.238:4090
      API_URL: http://api:8000
      WATCHPACK_POLLING: "true"
    depends_on:
      - api
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - ./frontend/src:/app/src
    networks:
      - healthos

  # ─── Clinical Decision Support Orchestrator ─────────────────────────────────
  clinical-orchestrator:
    build:
      context: ./clinical_decision_support/orchestrator
      dockerfile: Dockerfile
    ports:
      - "8201:8001"
    environment:
      BACKEND_INTERNAL: http://api:8000
      LLM_PROVIDER: claude
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: claude-sonnet-4-20250514
      OLLAMA_BASE_URL: http://ollama:11434
      LLM_TEMPERATURE: "0.3"
      LLM_MAX_TOKENS: "2000"
      MCP_FHIR_SERVER_URL: http://mcp-fhir-server:8005
      MCP_LABS_SERVER_URL: http://mcp-labs-server:8006
      MCP_RAG_SERVER_URL: http://mcp-rag-server:8007
      MCP_FHIR_ADAPTER_URL: http://mcp-fhir-adapter:8002
    depends_on:
      - api
    networks:
      - healthos

  # ─── MCP FHIR Server ────────────────────────────────────────────────────────
  mcp-fhir-server:
    build:
      context: ./clinical_decision_support/mcp/servers
      dockerfile: Dockerfile
    ports:
      - "8105:8005"
    environment:
      PORT: "8005"
      SERVER_NAME: mcp-fhir-server
      FHIR_BASE: http://hapi-fhir:8080/fhir
    command: python mcp_fhir_server.py
    networks:
      - healthos

  # ─── MCP Labs Server ────────────────────────────────────────────────────────
  mcp-labs-server:
    build:
      context: ./clinical_decision_support/mcp/servers
      dockerfile: Dockerfile
    ports:
      - "8106:8006"
    environment:
      PORT: "8006"
      SERVER_NAME: mcp-labs-server
    command: python mcp_labs_server.py
    networks:
      - healthos

  # ─── MCP RAG Server ─────────────────────────────────────────────────────────
  mcp-rag-server:
    build:
      context: ./clinical_decision_support/mcp/servers
      dockerfile: Dockerfile
    ports:
      - "8107:8007"
    environment:
      PORT: "8007"
      SERVER_NAME: mcp-rag-server
      QDRANT_URL: http://qdrant:6333
    command: python mcp_rag_server.py
    depends_on:
      - qdrant
    networks:
      - healthos

  # ─── MCP FHIR Writeback Adapter ────────────────────────────────────────────
  mcp-fhir-adapter:
    build:
      context: ./clinical_decision_support/mcp/tool_adapters/fhir_writeback
      dockerfile: Dockerfile
    ports:
      - "8102:8002"
    environment:
      PORT: "8002"
      FHIR_BASE: http://hapi-fhir:8080/fhir
    networks:
      - healthos

  # ─── IoT Device Simulator ──────────────────────────────────────────────────
  iot-simulator:
    build:
      context: ./clinical_decision_support/iot-simulator
      dockerfile: Dockerfile
    ports:
      - "8204:8004"
    environment:
      BACKEND_URL: http://api:8000
      MCP_ADAPTER_URL: http://mcp-fhir-adapter:8002
      ORCHESTRATOR_URL: http://clinical-orchestrator:8001
      DEFAULT_INTERVAL: "30"
      ENABLE_ALERTS: "true"
      ENABLE_AI_RECOMMENDATIONS: "true"
      AUTO_START: "false"
    depends_on:
      - api
      - clinical-orchestrator
    networks:
      - healthos

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5439:5432"
    environment:
      POSTGRES_DB: healthos
      POSTGRES_USER: healthos
      POSTGRES_PASSWORD: healthos
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthos"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - healthos

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6279:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - healthos

  # ─── Kafka (KRaft mode — no Zookeeper) ────────────────────────────────────
  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "9094:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "healthos-kafka-cluster-001"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - healthos

  # ─── Qdrant Vector Database ────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.1
    ports:
      - "6333:6333"
      - "6324:6334"
    volumes:
      - qdrantdata:/qdrant/storage
    networks:
      - healthos

  # ─── Neo4j Knowledge Graph ────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.25-community
    ports:
      - "7575:7474"
      - "7678:7687"
    environment:
      NEO4J_AUTH: neo4j/healthos
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4jdata:/data
    networks:
      - healthos

  # ─── Keycloak Identity Provider ────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    ports:
      - "8180:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: healthos
      KC_DB_PASSWORD: healthos
    command: start-dev --import-realm
    volumes:
      - keycloakdata:/opt/keycloak/data
      - ./infrastructure/keycloak/healthos-realm.json:/opt/keycloak/data/import/healthos-realm.json
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - healthos

  # ─── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9091:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheusdata:/prometheus
    networks:
      - healthos

  # ─── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3101:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: healthos
    volumes:
      - grafanadata:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - healthos

  # ─── Temporal Server ───────────────────────────────────────────────────────
  temporal:
    image: temporalio/auto-setup:1.25
    ports:
      - "7233:7233"
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: healthos
      POSTGRES_PWD: healthos
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    volumes:
      - ./infrastructure/temporal/dynamicconfig:/etc/temporal/config/dynamicconfig
      - temporaldata:/tmp/temporal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "tctl --address temporal:7233 cluster health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - healthos

  # ─── Temporal Web UI ─────────────────────────────────────────────────────
  temporal-ui:
    image: temporalio/ui:2.31.2
    ports:
      - "8233:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - temporal
    networks:
      - healthos

  # ─── Temporal Worker (HealthOS Workflows) ────────────────────────────────
  temporal-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m healthos_platform.services.temporal_worker
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://healthos:healthos@postgres:5432/healthos
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: healthos
      KEYCLOAK_URL: http://keycloak:8080
      TEMPORAL_ADDRESS: temporal:7233
    volumes:
      - .:/app
    depends_on:
      temporal:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - healthos

  # ─── MS Risk Screening Backend (Django) ──────────────────────────────────
  ms-risk-backend:
    build:
      context: ./ms_risk_screening/backend
      dockerfile: Dockerfile
    ports:
      - "8155:8000"
    command: >
      bash -c "
        python manage.py makemigrations core patients agents governance analytics --noinput &&
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput &&
        python manage.py seed_data --patients 2500 || true &&
        daphne -b 0.0.0.0 -p 8000 config.asgi:application
      "
    environment:
      DEBUG: "0"
      DATABASE_URL: postgresql://healthos:healthos@postgres:5432/ms_risk_lab
      REDIS_URL: redis://redis:6379/2
      CELERY_BROKER_URL: redis://redis:6379/3
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-ms-risk-lab-secret-key-change-in-production}
      ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: "http://localhost:3052,http://localhost:3000"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      MCP_ENABLED: "true"
      A2A_ENABLED: "true"
    volumes:
      - ./ms_risk_screening/backend:/app
      - ms_risk_static:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/')"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - healthos

  # ─── MS Risk Screening Celery Worker ─────────────────────────────────────
  ms-risk-celery:
    build:
      context: ./ms_risk_screening/backend
      dockerfile: Dockerfile
    command: >
      bash -c "
        echo 'Waiting for ms-risk-backend...' &&
        until python manage.py showmigrations --plan 2>/dev/null | grep -q '\[X\]'; do
          echo 'Backend not ready, waiting 5s...';
          sleep 5;
        done &&
        celery -A config worker -l info -c 4 -Q default,agents,analytics
      "
    environment:
      DEBUG: "0"
      DATABASE_URL: postgresql://healthos:healthos@postgres:5432/ms_risk_lab
      REDIS_URL: redis://redis:6379/2
      CELERY_BROKER_URL: redis://redis:6379/3
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-ms-risk-lab-secret-key-change-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
    volumes:
      - ./ms_risk_screening/backend:/app
    depends_on:
      ms-risk-backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - healthos

volumes:
  pgdata:
  redisdata:
  ms_risk_static:
  qdrantdata:
  neo4jdata:
  prometheusdata:
  keycloakdata:
  grafanadata:
  temporaldata:

networks:
  healthos:
    driver: bridge
