apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "healthos.fullname" . }}-config
  namespace: {{ include "healthos.namespace" . }}
  labels:
    {{- include "healthos.labels" . | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  CORS_ORIGINS: {{ .Values.config.corsOrigins | quote }}
  DATABASE_HOST: {{ .Values.config.databaseHost | quote }}
  DATABASE_PORT: {{ .Values.config.databasePort | quote }}
  DATABASE_NAME: {{ .Values.config.databaseName | quote }}
  REDIS_HOST: {{ .Values.config.redisHost | quote }}
  REDIS_PORT: {{ .Values.config.redisPort | quote }}
  KAFKA_BOOTSTRAP_SERVERS: {{ .Values.config.kafkaBootstrapServers | quote }}
  QDRANT_URL: {{ .Values.config.qdrantUrl | quote }}
  NEO4J_URI: {{ .Values.config.neo4jUri | quote }}
  KEYCLOAK_URL: {{ .Values.config.keycloakUrl | quote }}
