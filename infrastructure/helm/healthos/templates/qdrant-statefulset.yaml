{{- if .Values.qdrant.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "healthos.fullname" . }}-qdrant
  labels:
    {{- include "healthos.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  serviceName: {{ include "healthos.fullname" . }}-qdrant
  replicas: {{ .Values.qdrant.replicaCount }}
  selector:
    matchLabels:
      {{- include "healthos.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: qdrant
  template:
    metadata:
      labels:
        {{- include "healthos.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: qdrant
    spec:
      containers:
        - name: qdrant
          image: "{{ .Values.qdrant.image.repository }}:{{ .Values.qdrant.image.tag }}"
          ports:
            - name: http
              containerPort: {{ .Values.qdrant.port }}
            - name: grpc
              containerPort: {{ .Values.qdrant.grpcPort }}
          volumeMounts:
            - name: data
              mountPath: /qdrant/storage
          resources:
            {{- toYaml .Values.qdrant.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.qdrant.persistence.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "healthos.fullname" . }}-qdrant
  labels:
    {{- include "healthos.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.qdrant.port }}
      targetPort: http
      name: http
    - port: {{ .Values.qdrant.grpcPort }}
      targetPort: grpc
      name: grpc
  selector:
    {{- include "healthos.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
{{- end }}
