global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "healthos-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "healthos-api"

  - job_name: "healthos-worker"
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:8001"]
        labels:
          service: "healthos-worker"

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: "postgres"

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: "redis"

  - job_name: "kafka"
    static_configs:
      - targets: ["kafka:9101"]
        labels:
          service: "kafka"
