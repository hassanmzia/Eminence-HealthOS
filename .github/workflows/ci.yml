name: CI

on:
  push:
    branches: [main, "claude/*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: healthos_test
          POSTGRES_USER: healthos
          POSTGRES_PASSWORD: healthos
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6279:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://healthos:healthos@localhost:5432/healthos_test
          REDIS_URL: redis://localhost:6279/0
          APP_ENV: test
        run: pytest tests/ -v --tb=short --cov=healthos_platform --cov=modules

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: mypy healthos_platform/ modules/ --ignore-missing-imports

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security tools
        run: pip install bandit safety pip-audit

      - name: Bandit - Python security linter
        run: >
          bandit -r healthos_platform/ modules/
          -f json -o bandit-report.json
          --severity-level medium
          --confidence-level medium
          -x "*/tests/*,*/__pycache__/*"
          || true

      - name: Bandit - Check for high-severity issues (fails CI)
        run: >
          bandit -r healthos_platform/ modules/
          --severity-level high
          --confidence-level high
          -x "*/tests/*,*/__pycache__/*"

      - name: pip-audit - Dependency vulnerability scan
        run: |
          pip install -e ".[dev]"
          pip-audit --strict --desc 2>&1 || true

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json
          retention-days: 30
