global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'eminence-healthos'

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # ── HealthOS API (FastAPI / Uvicorn) ─────────────────────────────
  - job_name: 'healthos-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # ── Temporal Worker ──────────────────────────────────────────────
  - job_name: 'temporal-worker'
    static_configs:
      - targets: ['temporal-worker:9090']
    metrics_path: '/metrics'

  # ── Temporal Server ──────────────────────────────────────────────
  - job_name: 'temporal'
    static_configs:
      - targets: ['temporal:7233']
    metrics_path: '/metrics'

  # ── PostgreSQL Exporter ──────────────────────────────────────────
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # ── Redis Exporter ───────────────────────────────────────────────
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']

  # ── Neo4j ────────────────────────────────────────────────────────
  - job_name: 'neo4j'
    static_configs:
      - targets: ['neo4j:2004']
    metrics_path: '/metrics'

  # ── Qdrant Vector Database ──────────────────────────────────────
  - job_name: 'qdrant'
    static_configs:
      - targets: ['qdrant:6333']
    metrics_path: '/metrics'

  # ── Kafka Exporter ──────────────────────────────────────────────
  - job_name: 'kafka-exporter'
    static_configs:
      - targets: ['kafka-exporter:9308']

  # ── Node Exporter (Host Metrics) ────────────────────────────────
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # ── Prometheus Self-Monitoring ──────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
