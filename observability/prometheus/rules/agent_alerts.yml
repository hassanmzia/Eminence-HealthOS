groups:
  - name: healthos_agent_alerts
    rules:

      - alert: AgentDown
        expr: |
          (
            rate(healthos_agent_errors_total[5m]) > 0
          ) and (
            rate(healthos_agent_runs_total[5m]) == 0
              OR
            rate(healthos_agent_errors_total[5m]) / rate(healthos_agent_runs_total[5m]) >= 1
          )
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Agent {{ $labels.agent_name }} is down"
          description: "Agent {{ $labels.agent_name }} has been returning errors for more than 5 minutes. Error rate: {{ $value | humanizePercentage }}"
          runbook: "https://wiki.eminence-healthos.io/runbooks/agent-down"

      - alert: AgentHighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(healthos_agent_latency_seconds_bucket[5m])) by (le, agent_name)) > 30
        for: 2m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Agent {{ $labels.agent_name }} p95 latency exceeds 30 seconds"
          description: "Agent {{ $labels.agent_name }} 95th percentile latency is {{ $value | humanizeDuration }}, which exceeds the 30 second threshold."
          runbook: "https://wiki.eminence-healthos.io/runbooks/agent-high-latency"

      - alert: AgentQueueDepth
        expr: |
          healthos_queue_depth > 100
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Task queue {{ $labels.queue_name }} depth exceeds 100"
          description: "Task queue {{ $labels.queue_name }} currently has {{ $value }} tasks waiting. This may indicate a processing bottleneck."
          runbook: "https://wiki.eminence-healthos.io/runbooks/queue-depth"

      - alert: A2AMessageFailures
        expr: |
          (
            sum(rate(healthos_a2a_messages_total{status="error"}[1m]))
            /
            sum(rate(healthos_a2a_messages_total[1m]))
          ) > 0.1
        for: 2m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "A2A message failure rate exceeds 10% on channel {{ $labels.channel }}"
          description: "A2A messaging is experiencing {{ $value | humanizePercentage }} failures on channel {{ $labels.channel }}. Check agent connectivity and Kafka broker health."
          runbook: "https://wiki.eminence-healthos.io/runbooks/a2a-message-failures"

      - alert: CriticalAlertUnacknowledged
        expr: |
          (time() - healthos_alert_fired_timestamp{severity="critical"}) > 300
          and healthos_alert_acknowledged == 0
        for: 0m
        labels:
          severity: critical
          team: clinical
        annotations:
          summary: "Critical clinical alert not acknowledged within 5 minutes"
          description: "Critical alert {{ $labels.alert_id }} of type {{ $labels.alert_type }} for patient {{ $labels.patient_id }} has not been acknowledged. Alert has been active for {{ $value | humanizeDuration }}."
          runbook: "https://wiki.eminence-healthos.io/runbooks/critical-alert-unacknowledged"

      - alert: AgentOrchestrationFailed
        expr: |
          rate(healthos_pipeline_failures_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Agent orchestration pipeline failure detected"
          description: "Pipeline {{ $labels.pipeline_name }} has experienced {{ $value | humanize }} failures per second in the last 5 minutes. Patient care workflows may be interrupted."
          runbook: "https://wiki.eminence-healthos.io/runbooks/pipeline-orchestration-failed"
